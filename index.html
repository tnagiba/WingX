const fmt1=n=>Number(n||0).toLocaleString('en-US',{maximumFractionDigits:1});
const pct=n=>((Number(n)||0)*100).toFixed(1)+'%';
const monthLabel=m=>{const [y,mo]=m.split('-');return new Date(Number(y),Number(mo)-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'})};
const quarterOf=m=>{const [y,mo]=m.split('-').map(Number);return `${y} Q${Math.ceil(mo/3)}`};

function enrich(rows){return rows.map(o=>{const total=o.total??(o.under2+o.b23+o.b34+o.b4);const long=o.b34+o.b4;const dominant=[...BANDS].sort((a,b)=>(o[b.key]||0)-(o[a.key]||0))[0];return{...o,total,long,longShare:total?long/total:0,shortShare:total?o.under2/total:0,dominant}})}
function aggregate(rows,label){const map=new Map();rows.forEach(o=>{if(!map.has(o.operator))map.set(o.operator,{operator:o.operator,period:label,under2:0,b23:0,b34:0,b4:0,total:0,deps:0,tails:0});const r=map.get(o.operator);BANDS.forEach(b=>r[b.key]+=o[b.key]||0);r.total+=o.total||0;r.deps+=o.deps||0;r.tails=Math.max(r.tails,o.tails||0);});return enrich([...map.values()]);}

function sortedRows(rows){return [...rows].sort((a,b)=>rankValue(b)-rankValue(a))}
function scoped(rows){const s=sortedRows(rows);return state.scope==='all'?s:s.slice(0,Number(state.scope))}
function sumRows(rows,key){return rows.reduce((s,o)=>s+(key==='total'?o.total:(o[key]||0)),0)}
function update(){setupPeriods();const source=baseRows();let view=scoped(source);if(!view.length)return;if(!view.find(o=>o.operator===state.selected))state.selected=view[0].operator;const isFocused=state.band!=='all';const band=BANDS.find(b=>b.key===state.band);const viewTotal=sumRows(view,'total');const viewBand=isFocused?sumRows(view,state.band):viewTotal;const viewShort=sumRows(view,'under2');const viewLong=view.reduce((s,o)=>s+o.long,0);const leader=view[0];const prev=previousPeriod();let change='N/A',changeSub=state.mode==='historical'?'Historical aggregate':'No prior period';if(prev){const prevView=scoped(rowsForPeriod(prev));const prevVal=isFocused?sumRows(prevView,state.band):sumRows(prevView,'total');change=prevVal?pct((viewBand-prevVal)/prevVal):'N/A';changeSub=`vs ${state.mode==='monthly'?monthLabel(prev):prev}`;}const periodText=state.mode==='historical'?'All Historical':state.mode==='monthly'?monthLabel(state.period):state.period;document.getElementById('kpis').innerHTML=`<div class="kpi"><div class="kpi-label">Filtered Hours</div><div class="kpi-val">${fmt(viewBand)}</div><div class="kpi-sub">${isFocused?band.full:'all bands'} · ${state.scope==='all'?'all operators':'top '+state.scope}</div></div><div class="kpi"><div class="kpi-label">Leader</div><div class="kpi-val" style="font-size:17px">${leader.operator}</div><div class="kpi-sub">${fmt1(rankValue(leader))} hrs in view</div></div><div class="kpi"><div class="kpi-label">Short-haul Share</div><div class="kpi-val">${pct(viewShort/viewTotal)}</div><div class="kpi-sub">under 2h in filtered set</div></div><div class="kpi"><div class="kpi-label">Long-haul Share</div><div class="kpi-val">${pct(viewLong/viewTotal)}</div><div class="kpi-sub">3h+ in filtered set</div></div><div class="kpi"><div class="kpi-label">${state.mode==='quarterly'?'Quarter Change':'Month Change'}</div><div class="kpi-val">${change}</div><div class="kpi-sub">${changeSub}</div></div>`;document.getElementById('legend').innerHTML=isFocused?`<div class="legend-item"><div class="legend-dot" style="background:${band.color}"></div>${band.full}</div>`:BANDS.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${b.full}</div>`).join('');document.getElementById('chartTitle').textContent=isFocused?`${band.full} Hours by Operator`:'Mission Band Breakdown';document.getElementById('chartSub').textContent=`${periodText} · ${state.scope==='all'?'All operators':'Top '+state.scope} · ranked by ${isFocused?band.full:'total hours'}`;renderBars(view,isFocused,band);renderTable(view);renderDetail(source);renderSpark(view);}
function renderBars(view,isFocused,band){const max=Math.max(...view.map(o=>isFocused?o[state.band]:o.total));const area=document.getElementById('chartArea');area.innerHTML=view.map((o,i)=>{if(isFocused){const val=o[state.band]||0;return`<div class="hbar-row ${o.operator===state.selected?'active':''}" data-op="${encodeURIComponent(o.operator)}"><div class="hbar-name"><span class="hbar-rank">${i+1}</span>${o.operator}</div><div class="fbar-track"><div class="fbar-fill" style="width:${max?val/max*100:0}%;background:${band.color};opacity:.9"></div></div><div class="hbar-val">${fmt1(val)}</div></div>`}return`<div class="hbar-row ${o.operator===state.selected?'active':''}" data-op="${encodeURIComponent(o.operator)}"><div class="hbar-name"><span class="hbar-rank">${i+1}</span>${o.operator}</div><div class="hbar-track">${BANDS.map(b=>`<div class="hbar-seg" style="width:${max?o[b.key]/max*100:0}%;background:${b.color};opacity:.82" title="${b.full}: ${fmt1(o[b.key])} hrs"></div>`).join('')}</div><div class="hbar-val">${fmt1(o.total)}</div></div>`}).join('');area.querySelectorAll('.hbar-row').forEach(el=>el.onclick=()=>selectOp(decodeURIComponent(el.dataset.op)));}
function renderTable(view){document.getElementById('tableSub').textContent=`${view.length} operators · ranked by ${state.band==='all'?'total hours':BANDS.find(b=>b.key===state.band).full}`;document.getElementById('tableBody').innerHTML=view.map((o,i)=>`<tr class="${o.operator===state.selected?'active-row':''}" data-op="${encodeURIComponent(o.operator)}" style="cursor:pointer"><td>${i+1}</td><td>${o.operator}</td><td style="color:var(--accent)">${fmt1(o.total)}</td><td>${fmt1(o.under2)}</td><td>${fmt1(o.b23)}</td><td>${fmt1(o.b34)}</td><td>${fmt1(o.b4)}</td><td>${pct(o.longShare)}</td><td><span class="pill ${o.dominant.pillClass}">${o.dominant.label}</span></td></tr>`).join('');document.querySelectorAll('#tableBody tr').forEach(el=>el.onclick=()=>selectOp(decodeURIComponent(el.dataset.op)));}
function renderDetail(source){const o=source.find(x=>x.operator===state.selected)||source[0];document.getElementById('detailName').textContent=o.operator;document.getElementById('detailSub').textContent=`${fmt1(o.total)} hrs · ${fmt(o.deps)} departures · ${fmt(o.tails)} tails`;document.getElementById('donutVal').textContent=fmt(o.total);document.getElementById('bandBreakdown').innerHTML=BANDS.map(b=>{const share=o.total?o[b.key]/o.total:0;return`<div class="band-item"><div class="band-meta"><span>${b.full}</span><span style="color:${b.color}">${fmt1(o[b.key])} hrs · ${pct(share)}</span></div><div class="band-track"><div class="band-fill" style="width:${share*100}%;background:${b.color}"></div></div></div>`}).join('');if(donutChart)donutChart.destroy();donutChart=new Chart(document.getElementById('donutChart'),{type:'doughnut',data:{labels:BANDS.map(b=>b.full),datasets:[{data:BANDS.map(b=>o[b.key]),backgroundColor:BANDS.map(b=>b.color),borderWidth:0,hoverOffset:6}]},options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#111827',borderColor:'rgba(56,189,248,.3)',borderWidth:1,callbacks:{label:c=>`${c.label}: ${fmt1(c.parsed)} hrs`}}}}});}
function renderSpark(view){const top=view.slice(0,10);if(sparkChart)sparkChart.destroy();sparkChart=new Chart(document.getElementById('sparkChart'),{type:'bar',data:{labels:top.map(o=>o.operator.split(' ')[0].slice(0,8)),datasets:BANDS.map(b=>({label:b.full,data:top.map(o=>o[b.key]),backgroundColor:b.color+'99',borderColor:b.color,borderWidth:1.5,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9}}},y:{stacked:true,display:false}}}});}
function selectOp(name){state.selected=name;document.querySelectorAll('.hbar-row').forEach(el=>el.classList.toggle('active',decodeURIComponent(el.dataset.op)===name));document.querySelectorAll('#tableBody tr').forEach(el=>el.classList.toggle('active-row',decodeURIComponent(el.dataset.op)===name));renderDetail(baseRows());}
document.getElementById('periodMode').addEventListener('change',e=>{state.mode=e.target.value;setupPeriods();update();});
document.getElementById('periodSelect').addEventListener('change',e=>{state.period=e.target.value;update();});
document.getElementById('scopeSelect').addEventListener('change',e=>{state.scope=e.target.value;update();});
document.getElementById('bandSelect').addEventListener('change',e=>{state.band=e.target.value;update();});
setupPeriods();update();
</script>
</body>
</html>
