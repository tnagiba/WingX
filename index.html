<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WingX Operator Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#02050d;--panel:#07101f;--text:#eef6ff;--muted:#7f8ea8;--cyan:#5ee7ff}
body{margin:0;background:linear-gradient(180deg,#02050d,#030713);color:var(--text);font-family:Inter,Arial}
.container{max-width:1400px;margin:auto;padding:24px}
h2{margin-bottom:10px}
.controls{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
select,input{background:#07101f;color:#fff;border:1px solid #333;padding:10px;border-radius:8px;font-weight:600}
.chart-card{background:var(--panel);padding:16px;border-radius:12px}
</style>
</head>
<body>
<div class="container">

<h2>Competitor Flight Distribution</h2>

<div class="controls">
<input type="file" id="fileInput" multiple />

<select id="metricSelect">
<option value="under2">Under 2h</option>
<option value="b23">2-3h</option>
<option value="b34">3-4h</option>
<option value="b4">4h+</option>
<option value="total">Total (stacked)</option>
</select>

<select id="scopeSelect">
<option value="10">Top 10</option>
<option value="25">Top 25</option>
<option value="50">Top 50</option>
<option value="all">All</option>
</select>

<select id="modeSelect">
<option value="absolute">Absolute</option>
<option value="percent">Percent Share</option>
</select>

<select id="compareSelect" multiple size="1" style="min-width:220px"></select>
</div>

<div class="chart-card">
<canvas id="mainChart"></canvas>
</div>

</div>

<script>
let data = [];
const bands={under2:"#5ee7ff",b23:"#42b8ff",b34:"#8b93ff",b4:"#b975ff"};
let chart;

function total(o){return (o.under2||0)+(o.b23||0)+(o.b34||0)+(o.b4||0)}

function detectBand(filename){
filename = filename.toLowerCase();
if(filename.includes("under")) return "under2";
if(filename.includes("2-3")) return "b23";
if(filename.includes("3-4")) return "b34";
if(filename.includes("4+")) return "b4";
return null;
}

function processFiles(files){
const map = {};

Array.from(files).forEach(file=>{
const band = detectBand(file.name);
if(!band) return;

const reader = new FileReader();
reader.onload = e => {
const wb = XLSX.read(e.target.result, {type:"binary"});
const ws = wb.Sheets[wb.SheetNames[0]];
const rows = XLSX.utils.sheet_to_json(ws, {header:1});

rows.forEach(r=>{
const operator = r[0];
const hours = r[4];
if(!operator || typeof hours !== "number") return;

if(!map[operator]) map[operator]={operator,under2:0,b23:0,b34:0,b4:0};
map[operator][band] = hours;
});

// rebuild data after each file load
data = Object.values(map);
populateCompare();
render();
};
reader.readAsBinaryString(file);
});
}

function populateCompare(){
const sel=document.getElementById("compareSelect");
sel.innerHTML=data.map(o=>`<option value="${o.operator}">${o.operator}</option>`).join("");
}

function render(){
if(data.length===0) return;

const metric=document.getElementById("metricSelect").value;
const scope=document.getElementById("scopeSelect").value;
const mode=document.getElementById("modeSelect").value;
const selected=[...document.getElementById("compareSelect").selectedOptions].map(o=>o.value);

let sorted=[...data];

if(metric!=="total"){
sorted.sort((a,b)=>b[metric]-a[metric]);
} else {
sorted.sort((a,b)=>total(b)-total(a));
}

if(scope!=="all") sorted=sorted.slice(0,Number(scope));
if(selected.length>0) sorted=data.filter(o=>selected.includes(o.operator));

const labels=sorted.map(o=>o.operator);
let datasets=[];

if(metric==="total"){
datasets=[
{label:"<2h",data:sorted.map(o=>mode==="percent"?o.under2/total(o)*100:o.under2),backgroundColor:bands.under2},
{label:"2-3h",data:sorted.map(o=>mode==="percent"?o.b23/total(o)*100:o.b23),backgroundColor:bands.b23},
{label:"3-4h",data:sorted.map(o=>mode==="percent"?o.b34/total(o)*100:o.b34),backgroundColor:bands.b34},
{label:"4h+",data:sorted.map(o=>mode==="percent"?o.b4/total(o)*100:o.b4),backgroundColor:bands.b4}
];
} else {
datasets=[{
label:metric,
data:sorted.map(o=>mode==="percent"?o[metric]/total(o)*100:o[metric]),
backgroundColor:bands[metric]
}];
}

if(chart) chart.destroy();
chart=new Chart(document.getElementById("mainChart"),{
type:"bar",
data:{labels,datasets},
options:{
responsive:true,
plugins:{legend:{display:true},tooltip:{callbacks:{label:(c)=>mode==="percent"?c.parsed.y.toFixed(1)+"%":Number(c.parsed.y).toLocaleString()}}},
scales:{y:{ticks:{callback:(v)=>mode==="percent"?v+"%":Number(v).toLocaleString()}}}
}
});
}

document.getElementById("fileInput").addEventListener("change",e=>processFiles(e.target.files));
["metricSelect","scopeSelect","modeSelect","compareSelect"].forEach(id=>document.getElementById(id).addEventListener("change",render));
</script>

</body>
</html>
