<!DOCTYPE html>
<html lang="en">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#0a0e17;--surface:#111827;--border:rgba(148,163,184,.12);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#38bdf8;--accent2:#818cf8;--band1:#38bdf8;--band2:#6366f1;--band3:#a78bfa;--band4:#f472b6;--radius:10px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}.app{max-width:1440px;margin:0 auto;padding:20px 24px 40px}.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}.topbar h1{font-size:20px;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.topbar .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.04em;border:1px solid var(--border);padding:4px 10px;border-radius:99px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}.control-group{display:flex;flex-direction:column;gap:4px}.control-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}.control-group select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:500;outline:none;cursor:pointer;min-width:150px}.control-group select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.15)}.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}.kpi .kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}.kpi .kpi-val{font-size:26px;font-weight:900;letter-spacing:-.04em;margin-top:6px;font-family:'JetBrains Mono',monospace}.kpi .kpi-sub{font-size:12px;color:var(--text3);margin-top:2px}.main-grid{display:grid;grid-template-columns:1fr 340px;gap:16px}.chart-panel,.table-panel,.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}.chart-panel{padding:20px;overflow:hidden}.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:16px}.chart-title{font-size:15px;font-weight:700}.chart-subtitle{font-size:12px;color:var(--text3);margin-top:2px}.legend{display:flex;gap:14px;flex-wrap:wrap}.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}.legend-dot{width:10px;height:10px;border-radius:3px}.hbar-row{display:grid;grid-template-columns:170px 1fr 88px;gap:12px;align-items:center;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .15s}.hbar-row:hover{background:rgba(56,189,248,.06)}.hbar-row.active{background:rgba(56,189,248,.1);border-left:3px solid var(--accent)}.hbar-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hbar-rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-right:6px;display:inline-block;width:22px}.hbar-track{height:28px;display:flex;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.03)}.hbar-seg{height:100%;transition:width .4s ease}.hbar-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:right;color:var(--text2)}.fbar-track{height:28px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.03)}.fbar-fill{height:100%;border-radius:4px;transition:width .4s ease}.side-panel{display:flex;flex-direction:column;gap:12px}.detail-card .dc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px}.detail-card .dc-name{font-size:18px;font-weight:900;letter-spacing:-.02em}.detail-card .dc-sub{font-size:13px;color:var(--text2);margin-top:4px}.band-item{margin-top:10px}.band-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;gap:8px}.band-meta span:first-child{color:var(--text2)}.band-meta span:last-child{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right}.band-track{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}.band-fill{height:100%;border-radius:99px;transition:width .4s ease}.donut-wrap{position:relative;width:180px;height:180px;margin:8px auto 0}.donut-wrap canvas{width:100%!important;height:100%!important}.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.donut-center .dc-big{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace}.donut-center .dc-sm{font-size:10px;color:var(--text3);text-transform:uppercase}.table-panel{margin-top:16px}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:800px}th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:700;padding:10px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}td{padding:9px 8px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);font-family:'JetBrains Mono',monospace}td:first-child{color:var(--text3)}td:nth-child(2){font-family:'DM Sans',sans-serif;font-weight:600}tr:hover td{background:rgba(56,189,248,.04)}tr.active-row td{background:rgba(56,189,248,.08)}.pill{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;border:1px solid}.pill-1{color:var(--band1);border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.08)}.pill-2{color:var(--band2);border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.08)}.pill-3{color:var(--band3);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08)}.pill-4{color:var(--band4);border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.08)}.scroll-area{max-height:600px;overflow-y:auto}.scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:transparent}.scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}@media(max-width:1100px){.main-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){.kpi-row{grid-template-columns:1fr 1fr}.hbar-row{grid-template-columns:120px 1fr 60px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><h1>WingX Operator Intelligence</h1><span class="tag">Branded Charter &middot; US Domestic &middot; Excl. NetJets/Flexjet</span></div>
  <div class="controls">
    <div class="control-group"><label>Month</label><select id="monthSelect"></select></div>
    <div class="control-group"><label>Scope</label><select id="scopeSelect"><option value="10">Top 10</option><option value="25" selected>Top 25</option><option value="50">Top 50</option><option value="all">All Operators</option></select></div>
    <div class="control-group"><label>Hour Band</label><select id="bandSelect"><option value="all">All Bands</option><option value="under2">Under 2h</option><option value="b23">2–3h</option><option value="b34">3–4h</option><option value="b4">4h+</option></select></div>
  </div>
  <div class="kpi-row" id="kpis"></div>
  <div class="main-grid">
    <div>
      <div class="chart-panel"><div class="chart-header"><div><div class="chart-title" id="chartTitle">Hours by Operator</div><div class="chart-subtitle" id="chartSub">Click any row to inspect</div></div><div class="legend" id="legend"></div></div><div class="scroll-area" id="chartArea"></div></div>
      <div class="table-panel"><div class="chart-header"><div><div class="chart-title">Operator Rankings</div><div class="chart-subtitle" id="tableSub">Sorted by selected view</div></div></div><div class="table-wrap" style="max-height:400px;overflow:auto"><table><thead><tr><th>#</th><th>Operator</th><th>Total</th><th>&lt;2h</th><th>2-3h</th><th>3-4h</th><th>4h+</th><th>Long %</th><th>Dominant</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
    </div>
    <div class="side-panel"><div class="detail-card"><div class="dc-label">Selected Operator</div><div class="dc-name" id="detailName">—</div><div class="dc-sub" id="detailSub">—</div><div id="bandBreakdown"></div></div><div class="detail-card"><div class="dc-label">Mission Mix</div><div class="donut-wrap"><canvas id="donutChart"></canvas><div class="donut-center"><div class="dc-big" id="donutVal">—</div><div class="dc-sm">total hrs</div></div></div></div><div class="detail-card"><div class="dc-label">Top Operator Band Comparison</div><div style="height:160px"><canvas id="sparkChart"></canvas></div></div></div>
  </div>
</div>
<script>
const rawData=[
{operator:"flyExclusive",under2:6814.1,b23:5924.1,b34:3012.9,b4:1171.7,total:16922.8,deps:9752,tails:92},
{operator:"Vista America",under2:3750.0,b23:3790.1,b34:1637.8,b4:3514.6,total:12692.5,deps:6451,tails:69},
{operator:"Wheels Up Private Jets",under2:5397.8,b23:3327.6,b34:1443.7,b4:1130.8,total:11299.9,deps:6948,tails:88},
{operator:"Nicholas Air",under2:2995.8,b23:1253.0,b34:398.0,b4:154.3,total:4801.1,deps:3462,tails:29},
{operator:"Thrive Aviation",under2:1222.4,b23:702.2,b34:655.4,b4:1143.7,total:3723.7,deps:1928,tails:31},
{operator:"ATI Jet Inc",under2:1755.4,b23:1382.5,b34:441.8,b4:125.7,total:3705.4,deps:2320,tails:26},
{operator:"Sky Quest",under2:777.9,b23:1037.7,b34:86.6,b4:93.8,total:1996.0,deps:1308,tails:23},
{operator:"Silverhawk Aviation Inc",under2:848.4,b23:725.9,b34:350.8,b4:25.6,total:1950.7,deps:1311,tails:18},
{operator:"Kalitta Charters",under2:913.3,b23:589.2,b34:259.9,b4:41.1,total:1803.5,deps:1201,tails:26},
{operator:"Pittsburgh Jet Center",under2:841.8,b23:712.3,b34:91.0,b4:65.7,total:1710.8,deps:1247,tails:14},
{operator:"Cirrus Aviation",under2:1143.9,b23:296.9,b34:116.8,b4:135.4,total:1693.0,deps:1416,tails:19},
{operator:"Worldwide Jet Charter",under2:275.9,b23:240.8,b34:198.2,b4:863.8,total:1578.7,deps:635,tails:10},
{operator:"AB Jets",under2:722.1,b23:407.1,b34:224.0,b4:185.3,total:1538.5,deps:939,tails:10},
{operator:"Ventura Air Services",under2:606.6,b23:525.5,b34:176.8,b4:216.3,total:1525.2,deps:924,tails:14},
{operator:"Talon Air",under2:377.2,b23:586.0,b34:212.9,b4:340.4,total:1516.5,deps:786,tails:21},
{operator:"Latitude 33 Aviation",under2:706.8,b23:393.7,b34:216.9,b4:178.7,total:1496.1,deps:978,tails:23},
{operator:"Jet Access Aviation",under2:525.0,b23:520.6,b34:184.6,b4:132.3,total:1362.5,deps:833,tails:19},
{operator:"Pacific Coast Jet",under2:758.1,b23:306.0,b34:134.6,b4:81.7,total:1280.4,deps:890,tails:20},
{operator:"AirNet II",under2:684.9,b23:390.8,b34:145.3,b4:17.9,total:1238.9,deps:789,tails:14},
{operator:"M & N Aviation",under2:585.9,b23:297.7,b34:164.9,b4:169.9,total:1218.4,deps:796,tails:13},
{operator:"True Aviation",under2:281.6,b23:296.8,b34:243.1,b4:361.4,total:1182.9,deps:554,tails:7},
{operator:"Clay Lacy Aviation Inc",under2:308.3,b23:329.2,b34:102.5,b4:383.4,total:1123.4,deps:573,tails:27},
{operator:"Gold Aviation Services",under2:573.3,b23:344.2,b34:162.0,b4:29.8,total:1109.3,deps:800,tails:10},
{operator:"Exec 1 Aviation",under2:626.5,b23:411.3,b34:22.1,b4:4.2,total:1064.1,deps:732,tails:9},
{operator:"Spring City Aviation",under2:279.6,b23:475.4,b34:258.8,b4:35.6,total:1049.4,deps:624,tails:9}
];
const BANDS=[{key:'under2',label:'<2h',full:'Under 2h',color:'#38bdf8',pillClass:'pill-1'},{key:'b23',label:'2-3h',full:'2–3h',color:'#6366f1',pillClass:'pill-2'},{key:'b34',label:'3-4h',full:'3–4h',color:'#a78bfa',pillClass:'pill-3'},{key:'b4',label:'4h+',full:'4h+',color:'#f472b6',pillClass:'pill-4'}];
const fmt=n=>Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const fmt1=n=>Number(n||0).toLocaleString('en-US',{maximumFractionDigits:1});
const pct=n=>((n||0)*100).toFixed(1)+'%';
const normalizeMonth=m=>m||'Current Export';
const enriched=rawData.map(o=>{const total=('total'in o)?o.total:o.under2+o.b23+o.b34+o.b4;const long=o.b34+o.b4;const dominant=[...BANDS].sort((a,b)=>o[b.key]-o[a.key])[0];return{...o,month:normalizeMonth(o.month),total,long,longShare:total?long/total:0,shortShare:total?o.under2/total:0,dominant}});
let state={scope:'25',band:'all',month:'Current Export',selected:enriched[0]?.operator};
let donutChart,sparkChart;
Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(255,255,255,.06)';Chart.defaults.font.family="'DM Sans', sans-serif";
function initMonths(){const months=[...new Set(enriched.map(o=>o.month))];document.getElementById('monthSelect').innerHTML=months.map(m=>`<option value="${m}">${m}</option>`).join('');state.month=months[0]||'Current Export';}
function rowsForMonth(month=state.month){return enriched.filter(o=>o.month===month);}
function rankValue(o){return state.band==='all'?o.total:(o[state.band]||0);}
function getView(){let rows=[...rowsForMonth()].sort((a,b)=>rankValue(b)-rankValue(a));return state.scope==='all'?rows:rows.slice(0,Number(state.scope));}
function previousMonth(){const months=[...new Set(enriched.map(o=>o.month))];const idx=months.indexOf(state.month);return idx>0?months[idx-1]:null;}
function sumRows(rows,key){return rows.reduce((s,o)=>s+(key==='total'?o.total:o[key]||0),0);}
function update(){const view=getView();if(!view.length)return;const isFocused=state.band!=='all';const focusBand=BANDS.find(b=>b.key===state.band);if(!view.find(o=>o.operator===state.selected))state.selected=view[0].operator;const viewTotal=sumRows(view,'total');const viewBand=isFocused?sumRows(view,state.band):viewTotal;const bandShare=viewTotal?viewBand/viewTotal:0;const viewShort=sumRows(view,'under2');const viewLong=view.reduce((s,o)=>s+o.long,0);const leader=view[0];const prev=previousMonth();let mom='N/A',momSub='Add multiple month exports';if(prev){const prevRows=enriched.filter(o=>o.month===prev).sort((a,b)=>rankValue(b)-rankValue(a));const prevScoped=state.scope==='all'?prevRows:prevRows.slice(0,Number(state.scope));const prevVal=isFocused?sumRows(prevScoped,state.band):sumRows(prevScoped,'total');mom=prevVal?pct((viewBand-prevVal)/prevVal):'N/A';momSub=`vs ${prev}`;}const middleKpis=state.band==='all'?`<div class="kpi"><div class="kpi-label">Short-haul Share</div><div class="kpi-val">${pct(viewShort/viewTotal)}</div><div class="kpi-sub">under 2h in filtered set</div></div><div class="kpi"><div class="kpi-label">Long-haul Share</div><div class="kpi-val">${pct(viewLong/viewTotal)}</div><div class="kpi-sub">3h+ in filtered set</div></div>`:`<div class="kpi"><div class="kpi-label">Band Share</div><div class="kpi-val">${pct(bandShare)}</div><div class="kpi-sub">${focusBand.full} of total hours</div></div><div class="kpi"><div class="kpi-label">Total Market Hours</div><div class="kpi-val">${fmt(viewTotal)}</div><div class="kpi-sub">context for selected band</div></div>`;document.getElementById('kpis').innerHTML=`<div class="kpi"><div class="kpi-label">Filtered Hours</div><div class="kpi-val">${fmt(viewBand)}</div><div class="kpi-sub">${isFocused?focusBand.full:'all bands'} · ${state.scope==='all'?'all operators':'top '+state.scope}</div></div><div class="kpi"><div class="kpi-label">Leader</div><div class="kpi-val" style="font-size:17px">${leader.operator}</div><div class="kpi-sub">${fmt1(rankValue(leader))} hrs in view</div></div>${middleKpis}<div class="kpi"><div class="kpi-label">Month Change</div><div class="kpi-val">${mom}</div><div class="kpi-sub">${momSub}</div></div>`;document.getElementById('legend').innerHTML=isFocused?`<div class="legend-item"><div class="legend-dot" style="background:${focusBand.color}"></div>${focusBand.full}</div>`:BANDS.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${b.full}</div>`).join('');document.getElementById('chartTitle').textContent=isFocused?`${focusBand.full} Hours by Operator`:'Mission Band Breakdown';document.getElementById('chartSub').textContent=`${state.month} · ${state.scope==='all'?'All operators':'Top '+state.scope} · ranked by ${isFocused?focusBand.full:'total hours'}`;renderBars(view,isFocused,focusBand);renderTable(view);renderDetail();renderSpark(view);}
function renderBars(view,isFocused,focusBand){const max=Math.max(...view.map(o=>isFocused?o[state.band]:o.total));const area=document.getElementById('chartArea');area.innerHTML=view.map((o,i)=>{if(isFocused){const val=o[state.band]||0;const w=max?val/max*100:0;return`<div class="hbar-row ${o.operator===state.selected?'active':''}" data-op="${encodeURIComponent(o.operator)}"><div class="hbar-name"><span class="hbar-rank">${i+1}</span>${o.operator}</div><div class="fbar-track"><div class="fbar-fill" style="width:${w}%;background:${focusBand.color};opacity:.9"></div></div><div class="hbar-val">${fmt1(val)}</div></div>`}return`<div class="hbar-row ${o.operator===state.selected?'active':''}" data-op="${encodeURIComponent(o.operator)}"><div class="hbar-name"><span class="hbar-rank">${i+1}</span>${o.operator}</div><div class="hbar-track">${BANDS.map(b=>`<div class="hbar-seg" style="width:${max?o[b.key]/max*100:0}%;background:${b.color};opacity:.82" title="${b.full}: ${fmt1(o[b.key])} hrs"></div>`).join('')}</div><div class="hbar-val">${fmt1(o.total)}</div></div>`}).join('');area.querySelectorAll('.hbar-row').forEach(el=>el.onclick=()=>selectOp(decodeURIComponent(el.dataset.op)));}
function renderTable(view){document.getElementById('tableSub').textContent=`${view.length} operators · ranked by ${state.band==='all'?'total hours':BANDS.find(b=>b.key===state.band).full}`;document.getElementById('tableBody').innerHTML=view.map((o,i)=>`<tr class="${o.operator===state.selected?'active-row':''}" data-op="${encodeURIComponent(o.operator)}" style="cursor:pointer"><td>${i+1}</td><td>${o.operator}</td><td style="color:var(--accent)">${fmt1(o.total)}</td><td>${fmt1(o.under2)}</td><td>${fmt1(o.b23)}</td><td>${fmt1(o.b34)}</td><td>${fmt1(o.b4)}</td><td>${pct(o.longShare)}</td><td><span class="pill ${o.dominant.pillClass}">${o.dominant.label}</span></td></tr>`).join('');document.querySelectorAll('#tableBody tr').forEach(el=>el.onclick=()=>selectOp(decodeURIComponent(el.dataset.op)));}
function renderDetail(){const o=enriched.find(x=>x.operator===state.selected&&x.month===state.month)||getView()[0];const view=getView();const viewTotal=sumRows(view,'total');const isFocused=state.band!=='all';const focusBand=BANDS.find(b=>b.key===state.band);const operatorBandShare=isFocused&&o.total?o[state.band]/o.total:null;document.getElementById('detailName').textContent=o.operator;document.getElementById('detailSub').textContent=isFocused?`${fmt1(o.total)} hrs · ${pct(operatorBandShare)} ${focusBand.full} mix`:`${fmt1(o.total)} hrs · ${o.deps||'—'} departures · ${o.tails||'—'} tails`;document.getElementById('donutVal').textContent=fmt(o.total);document.getElementById('bandBreakdown').innerHTML=BANDS.map(b=>{const share=o.total?o[b.key]/o.total:0;const marketDen=sumRows(view,b.key);const marketShare=marketDen?o[b.key]/marketDen:0;const comparison=` · ${pct(marketShare)} of market`;return`<div class="band-item"><div class="band-meta"><span>${b.full}</span><span style="color:${b.color}">${fmt1(o[b.key])} hrs · ${pct(share)}${comparison}</span></div><div class="band-track"><div class="band-fill" style="width:${share*100}%;background:${b.color}"></div></div></div>`}).join('');if(donutChart)donutChart.destroy();donutChart=new Chart(document.getElementById('donutChart'),{type:'doughnut',data:{labels:BANDS.map(b=>b.full),datasets:[{data:BANDS.map(b=>o[b.key]),backgroundColor:BANDS.map(b=>b.color),borderWidth:0,hoverOffset:6}]},options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#111827',borderColor:'rgba(56,189,248,.3)',borderWidth:1,callbacks:{label:c=>`${c.label}: ${fmt1(c.parsed)} hrs`}}}}});}
function renderSpark(view){const top=view.slice(0,10);if(sparkChart)sparkChart.destroy();sparkChart=new Chart(document.getElementById('sparkChart'),{type:'bar',data:{labels:top.map(o=>o.operator.split(' ')[0].slice(0,8)),datasets:BANDS.map(b=>({label:b.full,data:top.map(o=>o[b.key]),backgroundColor:b.color+'99',borderColor:b.color,borderWidth:1.5,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9}}},y:{stacked:true,display:false}}}});}
function selectOp(name){state.selected=name;document.querySelectorAll('.hbar-row').forEach(el=>el.classList.toggle('active',decodeURIComponent(el.dataset.op)===name));document.querySelectorAll('#tableBody tr').forEach(el=>el.classList.toggle('active-row',decodeURIComponent(el.dataset.op)===name));renderDetail();}
document.getElementById('monthSelect').addEventListener('change',e=>{state.month=e.target.value;update();});document.getElementById('scopeSelect').addEventListener('change',e=>{state.scope=e.target.value;update();});document.getElementById('bandSelect').addEventListener('change',e=>{state.band=e.target.value;update();});initMonths();update();
</script>
</body>
</html>
